<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>{{ game['title'] }} - Planned for Sprint 2</title>
</head>
<body>
    <div class="container">
        <div class="content">
            <div class="content-header">
                <h1>{{ game['title'] }}</h1>
                <p>The full game detail and review page is planned for Sprint 2.</p>
            </div>
            <div class="game-card">
                <p>Current Sprint 1 data:</p>
                <p>Price: ${{ "%.2f"|format(game['price']) }}</p>
                <p>Average rating: {{ game['average_rating'] }}/5</p>
            </div>
            <a class="button-link" href="/">Back to games</a>
        </div>
    </div>
</body>
</html>
